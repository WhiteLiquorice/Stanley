<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hacker News</title>
<style>
  body { margin: 0; background: #f6f6ef; font-family: Verdana, Geneva, sans-serif; font-size: 10pt; }
  #header { background: #ff6600; padding: 2px 4px; display: flex; align-items: center; gap: 8px; }
  #header a { color: #000; font-weight: bold; text-decoration: none; font-size: 13pt; }
  #header nav a { color: #000; font-size: 9pt; margin: 0 4px; }
  #header .logo { background: #fff; color: #ff6600; font-weight: bold; padding: 1px 4px; font-size: 14pt; }
  .spacer { height: 10px; background: #ff6600; }
  table.itemlist { margin: 10px auto; border-spacing: 0; }
  .rank { padding-right: 6px; color: #828282; vertical-align: top; padding-top: 2px; min-width: 28px; text-align: right; }
  .votelinks { vertical-align: top; padding-top: 1px; padding-right: 4px; }
  .upvote { display: block; width: 10px; height: 10px; border-left: 5px solid transparent; border-right: 5px solid transparent; border-bottom: 10px solid #9a9a9a; cursor: pointer; }
  .upvote:hover { border-bottom-color: #ff6600; }
  .title { vertical-align: top; line-height: 1.4; }
  .title a { color: #000; font-size: 10pt; }
  .title a:visited { color: #828282; }
  .sitebit { font-size: 8pt; color: #828282; margin-left: 6px; }
  .subtext { color: #828282; font-size: 8pt; padding-left: 44px; padding-bottom: 8px; }
  .subtext a { color: #828282; }
  tr.spacer td { height: 5px; }
  .story-highlight { background-color: rgba(255, 102, 0, 0.12) !important; transition: background-color 0.4s; }
</style>
</head>
<body>
<table border="0" cellpadding="0" cellspacing="0" id="hnmain" width="85%" style="margin: 0 auto; background: #f6f6ef;">
  <tbody>
  <tr>
    <td>
      <div id="header">
        <span class="logo">Y</span>
        <a href="#">Hacker News</a>
        <nav>
          <a href="#">new</a> | <a href="#">past</a> | <a href="#">comments</a> | <a href="#">ask</a> | <a href="#">show</a> | <a href="#">jobs</a> | <a href="#">submit</a>
        </nav>
        <span style="flex:1"></span>
        <a href="#" style="font-size:9pt; color:#000;">login</a>
      </div>
    </td>
  </tr>
  <tr>
    <td>
      <table class="itemlist" style="width:100%">
        <tbody id="stories">
        </tbody>
      </table>
    </td>
  </tr>
  </tbody>
</table>

<script>
const stories = [
  { rank: 1, title: "OpenAI releases o3-mini with extended reasoning at 10× lower cost", domain: "openai.com", points: 847, comments: 312 },
  { rank: 2, title: "Cloudflare expands zero-trust access to 130 countries with AI-assisted threat detection", domain: "blog.cloudflare.com", points: 634, comments: 198 },
  { rank: 3, title: "Stripe launches embedded finance platform for B2B SaaS", domain: "stripe.com", points: 521, comments: 174 },
  { rank: 4, title: "Japan passes landmark AI transparency legislation, effective Jan 2027", domain: "reuters.com", points: 498, comments: 267 },
  { rank: 5, title: "YC W24 batch: $2.4B combined valuation, 8 companies already at $100M ARR", domain: "techcrunch.com", points: 445, comments: 221 },
  { rank: 6, title: "Researchers achieve 99.9% accuracy in protein folding with sub-1Å resolution", domain: "nature.com", points: 712, comments: 143 },
  { rank: 7, title: "Firefox 127 ships with private local AI inference — no data leaves your device", domain: "mozilla.org", points: 389, comments: 302 },
  { rank: 8, title: "The quiet rise of local-first software: 40% of devs now prefer offline-capable apps", domain: "localfirstweb.dev", points: 334, comments: 189 },
  { rank: 9, title: "How Figma rebuilt its collaboration engine for 10× scale with zero downtime", domain: "figma.com", points: 298, comments: 97 },
  { rank: 10, title: "Why more senior engineers are returning to boring technology stacks in 2024", domain: "boringtechnology.club", points: 876, comments: 441 }
];

const tbody = document.getElementById('stories');
stories.forEach(s => {
  const hoursAgo = Math.floor(Math.random() * 5) + 1;
  tbody.innerHTML += `
    <tr class="athing" id="story-${s.rank}">
      <td class="rank">${s.rank}.</td>
      <td class="votelinks"><a href="#"><div class="upvote"></div></a></td>
      <td class="title">
        <a href="#">${s.title}</a>
        <span class="sitebit">(${s.domain})</span>
      </td>
    </tr>
    <tr>
      <td colspan="2"></td>
      <td class="subtext">
        ${s.points} points | by <a href="#">user${(Math.random()*9000+1000).toFixed(0)}</a> | ${hoursAgo} hours ago | <a href="#">${s.comments} comments</a>
      </td>
    </tr>
    <tr class="spacer"><td></td></tr>
  `;
});
</script>
</body>
</html>
