steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file
      - GPT-Additions/cloud-run-api/Dockerfile
      - --tag
      - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/stanley-runner:gpt-overhaul
      - .
images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/stanley-runner:gpt-overhaul
options:
  logging: CLOUD_LOGGING_ONLY
